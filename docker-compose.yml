services:
  aperture-langfuse-relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: aperture-langfuse-relay:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TSNET_STATE_DIR: /var/lib/tsnet
    volumes:
      - tsnet-state:/var/lib/tsnet

volumes:
  tsnet-state:
